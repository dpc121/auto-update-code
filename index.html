
<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body{font-family:Arial;margin:20px}
    textarea{width:100%;height:120px}
    button{padding:8px 14px;margin:5px}
    pre{background:#f4f4f4;padding:10px}
  </style>
</head>
<body>

<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">
  <h3>Global Kill Switch</h3>
  <button onclick="toggleKill()">Toggle ON/OFF</button>
  <pre id="kill"></pre>

  <h3>One Click License Generator</h3>
  <button onclick="gen()">Generate License</button>
  <pre id="license"></pre>

  <h3>Upload Tampermonkey Code (Multiple)</h3>
  <input id="sname" placeholder="Script Name"><br>
  <textarea id="scode" placeholder="Paste Tampermonkey code"></textarea><br>
  <button onclick="addScript()">Encrypt & Add</button>
  <pre id="scripts"></pre>
</div>

<script src="crypto.js"></script>
<script src="admin.js"></script>
</body>
</html>
